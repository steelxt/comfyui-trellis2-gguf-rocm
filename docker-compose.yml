services:
  comfyui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BASE_IMAGE=rocm/pytorch:latest
        - GPU_ARCH=gfx1200
    image: comfyui-trellis2-gguf-rocm:latest
    container_name: comfyui-trellis
    restart: unless-stopped
    ports:
      - "8188:8188"
    ipc: host
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    devices:
      - "/dev/kfd:/dev/kfd"
      - "/dev/dri:/dev/dri"
    group_add:
      - video
      - render
    environment:
      # Use only the discrete GPU (deviceId 0, gfx1200). Avoid deviceId 1 (gfx1036, integrated).
      - HIP_VISIBLE_DEVICES=0
      - TORCH_ROCM_AOTRITON_ENABLE_EXPERIMENTAL=1
      - FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
      - PYTORCH_NO_HIP_MEMORY_CACHING=1
      - COMFYUI_ENABLE_MIOPEN=1
      - MIOPEN_FIND_MODE=FAST
      - MIOPEN_ENABLE_CACHE=1
      - FLASH_ATTENTION_FWD_TRITON_AMD_CONFIG_JSON={"BLOCK_M":128,"BLOCK_N":64,"waves_per_eu":1,"PRE_LOAD_V":false,"num_stages":1,"num_warps":8}
      # Prevent VRAM fragmentation OOMs on ROCm
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Debug memory faults synchronously
      - CUDA_LAUNCH_BLOCKING=1
      - HIP_LAUNCH_BLOCKING=1
    volumes:
      # Mount folders to persist models, input images, generated outputs, and user state
      - ./models:/app/ComfyUI/models
      - ./input:/app/ComfyUI/input
      - ./output:/app/ComfyUI/output
      - ./user:/app/ComfyUI/user
      # Mount scripts for instant updates during development/testing
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./trellis2-gguf-model-downloader.sh:/app/trellis2-gguf-model-downloader.sh
